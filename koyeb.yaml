services:
  tg-client:
    build:
      context: .
      dockerfile: Dockerfile
    env:
      - name: TELEGRAM_BOT_TOKEN
        value: $TELEGRAM_BOT_TOKEN
      - name: PORT
        value: "8000"
    ports:
      - port: 8000
        protocol: http
    health_checks:
      - grace_period: 10
        interval: 30
        path: /health
        port: 8000
        protocol: http
        timeout: 5
    instance:
      type: nano
      regions:
        - fra
