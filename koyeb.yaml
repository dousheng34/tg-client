# 🚀 KOYEB DEPLOYMENT КОНФИГУРАЦИЯСЫ
# Қазақ Әдебиеті Telegram Боты v4.0

name: tg-client
description: "🎓 Қазақ әдебиетін оқыту Telegram боты"

services:
  - name: tg-client
    github:
      repo: dousheng34/tg-client
      branch: main
    
    build:
      buildpack: dockerfile
      
    env:
      - key: TELEGRAM_BOT_TOKEN
        scope: build,run
        value: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      
      - key: ENVIRONMENT
        value: production
    
    run:
      command: python bot.py
    
    scaling:
      min_instances: 1
      max_instances: 1
    
    health_check:
      disabled: true
