# 🚀 KOYEB DEPLOYMENT КОНФИГУРАЦИЯСЫ
# Қазақ Әдебиеті Telegram Боты v4.0

name: kazakh-literature-bot
description: "🎓 Қазақ әдебиетін оқыту Telegram боты"

services:
  - name: bot
    github:
      repo: your-username/kazakh-literature-bot
      branch: main
    
    build:
      buildpack: python
      
    env:
      - key: BOT_TOKEN
        scope: build,run
        value: ${{ secrets.BOT_TOKEN }}
      
      - key: ENVIRONMENT
        value: production
      
      - key: PORT
        value: "8000"
    
    run:
      command: python kazakh_literature_bot.py
    
    routes:
      - path: /
        port: 8000
    
    scaling:
      min_instances: 1
      max_instances: 3
      
    health_check:
      enabled: true
      path: /health
      initial_delay: 30
      period: 10

# Secrets (Koyeb Dashboard-та орнату)
secrets:
  BOT_TOKEN: "your-telegram-bot-token-here"
