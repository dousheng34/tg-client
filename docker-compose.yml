# 🐳 DOCKER COMPOSE КОНФИГУРАЦИЯСЫ
# Қазақ Әдебиеті Telegram Боты v4.0

version: '3.8'

services:
  # Telegram Боты
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    
    container_name: kazakh-literature-bot
    
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - ENVIRONMENT=production
      - PORT=8000
      - LOG_LEVEL=INFO
      - DEBUG=False
    
    ports:
      - "8000:8000"
    
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    
    restart: unless-stopped
    
    networks:
      - bot-network
    
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # PostgreSQL Database (болашақ)
  # db:
  #   image: postgres:15-alpine
  #   container_name: kazakh-literature-db
  #   environment:
  #     POSTGRES_DB: kazakh_literature
  #     POSTGRES_USER: ${DB_USER}
  #     POSTGRES_PASSWORD: ${DB_PASSWORD}
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - bot-network
  #   restart: unless-stopped

networks:
  bot-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
